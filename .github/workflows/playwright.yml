name: Playwright Tests
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  playwright:
    name: 'Playwright Tests'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.60.0-noble
      options: --user 1001

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: opencart
          MYSQL_USER: opencart
          MYSQL_PASSWORD: opencart
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      opencart:
        image: bitnami/opencart:latest
        env:
          OPENCART_DATABASE_HOST: mysql
          OPENCART_DATABASE_USER: opencart
          OPENCART_DATABASE_PASSWORD: opencart
          OPENCART_DATABASE_NAME: opencart
        ports:
          - 80:8080

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Wait for OpenCart to be ready
        run: |
          for i in $(seq 1 30); do
            curl -s http://opencart/demo/ && break
            echo "Waiting for OpenCart... ($i)"
            sleep 10
          done
      - name: Run your tests
        run: pytest